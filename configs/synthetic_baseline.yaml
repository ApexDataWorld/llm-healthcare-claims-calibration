{
  "paper_id": 3,
  "title": "Calibration-Aware LLM Decision Support for Healthcare Claims",
  "random_seed": 20260503,
  "data": {
    "source": "synthetic",
    "n_claims": 1200,
    "train_fraction": 0.5,
    "calibration_fraction": 0.25,
    "test_fraction": 0.25
  },
  "calibration": {
    "methods": ["raw", "temperature_scaling", "platt_scaling", "isotonic_regression"],
    "bins": 10
  },
  "abstention": {
    "thresholds": [0.5, 0.6, 0.7, 0.8, 0.85, 0.9, 0.95],
    "risk_tiers": {
      "low": 0.8,
      "medium": 0.88,
      "high": 0.95,
      "mandatory_review": 1.01
    }
  },
  "expected_loss": {
    "false_approval_cost": 500.0,
    "false_denial_cost": 1500.0,
    "false_request_info_cost": 200.0,
    "human_review_cost": 75.0,
    "high_risk_delay_cost": 250.0
  },
  "cost_sensitivity": {
    "enabled": true,
    "scenarios": ["baseline_4x", "high_decision_cost_10x", "high_review_cost_2x", "symmetric_1x"]
  },
  "confidence_variants": {
    "enabled": true,
    "variants": ["simulated", "consistency", "logit_margin"],
    "consistency_k_samples": 3,
    "consistency_perturbation_scale": 0.05,
    "logit_margin_enabled": true
  },
  "outputs": {
    "dataset_path": "data/synthetic/claims_synthetic.csv",
    "tables_dir": "paper/tables",
    "figures_dir": "paper/figures",
    "results_dir": "results",
    "report_path": "reports/experiment_summary.md"
  }
}
